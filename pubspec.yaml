name: focusflow
description: FocusFlow - Smart Study Planner for Students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Networking
  dio: ^5.4.3+1
  # Local storage
  shared_preferences: ^2.2.3
  # Google Fonts (Poppins)
  google_fonts: ^6.2.1
  # State management
  provider: ^6.1.2
  # Utils
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/